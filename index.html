    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at top, #2e2456 0%, #11101d 45%, #050509 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .app {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }
    h1 {
      font-size: clamp(26px, 7.4vw, 32px);
      margin: 0 0 22px;
      letter-spacing: 0.035em;
      font-weight: 850;
      line-height: 1.18;
    }
    .machine {
      position: relative;
      height: 170px;
      margin-bottom: 18px;
    }
    .ufo {
      font-size: 66px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.45));
      user-select: none;
    }
    .claw {
      position: absolute;
      top: 70px;
      left: 50%;
      width: 4px;
      height: 55px;
      background: rgba(255,255,255,0.65);
      transform: translateX(-50%);
      transform-origin: top;
    }
    .claw::after {
      content: "⌄";
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      color: rgba(255,255,255,0.9);
    }
    .capsules {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 26px;
      opacity: 0.9;
      user-select: none;
    }
    .drawing .ufo { animation: hover 0.55s infinite alternate ease-in-out; }
    .drawing .claw { animation: grab 1.8s ease-in-out; }
    @keyframes hover {
      from { transform: translateX(-55%) translateY(0); }
      to { transform: translateX(-45%) translateY(7px); }
    }
    @keyframes grab {
      0% { height: 45px; }
      45% { height: 95px; }
      80% { height: 48px; }
      100% { height: 55px; }
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 15px 24px;
      font-size: 17px;
      font-weight: 800;
      color: #171124;
      background: #fff36d;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: translateY(1px); }
    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }
    .card {
      display: none;
      margin-top: 22px;
      padding: 24px 20px 22px;
      border-radius: 28px;
      background: rgba(255,255,255,0.96);
      color: #171124;
      box-shadow: 0 18px 50px rgba(0,0,0,0.42);
      animation: pop 0.35s ease-out;
      text-align: left;
    }
    .card.show { display: block; }
    @keyframes pop {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .song {
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      color: #6b5aa8;
      margin-bottom: 18px;
      word-break: keep-all;
    }
    .lyric {
      font-family: "Georgia", "Apple SD Gothic Neo", serif;
      font-size: clamp(18px, 5.2vw, 20px);
      line-height: 1.65;
      letter-spacing: -0.04em;
      text-align: center;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: anywhere;
      margin: 0 0 22px;
    }
    .comment {
      margin: 0 auto 22px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f1eefb;
      font-size: clamp(16px, 4.8vw, 18px);
      font-weight: 800;
      line-height: 1.45;
      text-align: center;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }
    .bill {
      border-top: 1px dashed #c9c1e6;
      padding-top: 18px;
      text-align: center;
    }
    .amount-label {
      font-size: 13px;
      color: #6b5aa8;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .amount {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .bill-text {
      font-size: 14px;
      line-height: 1.55;
      color: #4d4664;
      white-space: pre-line;
      word-break: keep-all;
    }
    .actions {
      display: none;
      margin-top: 16px;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .actions.show { display: flex; }
    .secondary {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: none;
      font-size: 15px;
      padding: 12px 18px;
    }
    .primary {
      font-size: 15px;
      padding: 12px 18px;
    }
    @media (max-width: 360px) {
      body { padding: 14px; }
      .machine { height: 158px; }
      .ufo { font-size: 60px; }
      .claw { top: 64px; }
      .capsules { font-size: 23px; }
      .card { padding: 22px 16px 20px; border-radius: 24px; }
      button { width: 100%; }
      .actions button { width: auto; flex: 1 1 140px; }
    }
  </style>

마음에 드셨다면 입금해주세요.</div>

    </section>

      song: "꽝",

    };

    const machine = document.getElementById("machine");
    const drawBtn = document.getElementById("drawBtn");
    const againBtn = document.getElementById("againBtn");
    const joinBtn = document.getElementById("joinBtn");
    const cardEl = document.getElementById("card");
    const actions = document.getElementById("actions");
    const songEl = document.getElementById("song");
    const lyricEl = document.getElementById("lyric");
    const commentEl = document.getElementById("comment");
    const amountEl = document.getElementById("amount");
    const pools = cards.reduce((grouped, card) => {
      grouped[card.rarity].push(card);
      return grouped;
    }, { common: [], rare: [], secret: [] });

    let audioContext;

    function getAudioContext() {
      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        audioContext = new AudioContextClass();
      }
      if (audioContext.state === "suspended") audioContext.resume();
      return audioContext;
    }

    function playTone(frequency, startTime, duration, gainValue, type = "sine") {
      const context = getAudioContext();
      if (!context) return;
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(gainValue, startTime + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.02);
    }

    function playClickSound() {
      const context = getAudioContext();
      if (!context) return;
      const now = context.currentTime;
      playTone(520, now, 0.08, 0.06, "square");
      playTone(780, now + 0.055, 0.09, 0.045, "sine");
    }

    function playRevealSound() {
      const context = getAudioContext();
      if (!context) return;
      const now = context.currentTime;
      playTone(880, now, 0.08, 0.04, "sine");
      playTone(1175, now + 0.07, 0.1, 0.035, "sine");
      playTone(1568, now + 0.14, 0.12, 0.03, "triangle");
    }

    function chooseFrom(poolName) {
      const pool = pools[poolName];
      if (!pool || pool.length === 0) return cards[Math.floor(Math.random() * cards.length)];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function pickWeightedCard() {
      const roll = Math.random() * 100;
      if (roll < 3) return blankCard;
      if (roll < 8) return chooseFrom("secret");
      if (roll < 28) return chooseFrom("rare");
      return chooseFrom("common");
    }

    function renderCard(card) {
      songEl.textContent = card.song === "꽝" ? "💥 꽝" : "🎵 " + card.song;
      lyricEl.textContent = "“" + card.lyric + "”";
      commentEl.textContent = card.comment;
      amountEl.textContent = card.amount;
    }

    function pickCard() {
      playClickSound();
      cardEl.classList.remove("show");
      actions.classList.remove("show");
      drawBtn.disabled = true;
      drawBtn.textContent = "집게 작동 중...";
      machine.classList.add("drawing");

      setTimeout(() => {
        const card = pickWeightedCard();
        renderCard(card);
        machine.classList.remove("drawing");
        drawBtn.disabled = false;
        drawBtn.textContent = "가사 뽑기";
        cardEl.classList.add("show");
