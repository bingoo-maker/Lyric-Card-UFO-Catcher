<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가사 UFO Catcher MVP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at top, #2e2456 0%, #11101d 45%, #050509 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .app {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      letter-spacing: -0.04em;
    }
    .subtitle {
      opacity: 0.75;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .machine {
      position: relative;
      height: 170px;
      margin-bottom: 18px;
    }
    .ufo {
      font-size: 66px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.45));
    }
    .claw {
      position: absolute;
      top: 70px;
      left: 50%;
      width: 4px;
      height: 55px;
      background: rgba(255,255,255,0.65);
      transform: translateX(-50%);
      transform-origin: top;
    }
    .claw::after {
      content: "⌄";
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      color: rgba(255,255,255,0.9);
    }
    .capsules {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 26px;
      opacity: 0.9;
    }
    .drawing .ufo { animation: hover 0.55s infinite alternate ease-in-out; }
    .drawing .claw { animation: grab 1.8s ease-in-out; }
    @keyframes hover {
      from { transform: translateX(-55%) translateY(0); }
      to { transform: translateX(-45%) translateY(7px); }
    }
    @keyframes grab {
      0% { height: 45px; }
      45% { height: 95px; }
      80% { height: 48px; }
      100% { height: 55px; }
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 15px 24px;
      font-size: 17px;
      font-weight: 800;
      color: #171124;
      background: #fff36d;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }
    button:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    .card {
      display: none;
      margin-top: 22px;
      padding: 24px 20px 22px;
      border-radius: 28px;
      background: rgba(255,255,255,0.96);
      color: #171124;
      box-shadow: 0 18px 50px rgba(0,0,0,0.42);
      animation: pop 0.35s ease-out;
      text-align: left;
    }
    .card.show { display: block; }
    @keyframes pop {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .song {
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      color: #6b5aa8;
      margin-bottom: 18px;
    }
    .lyric {
      font-family: "Georgia", "Apple SD Gothic Neo", serif;
      font-size: 20px;
      line-height: 1.65;
      letter-spacing: -0.04em;
      text-align: center;
      white-space: pre-line;
      margin: 0 0 22px;
    }
    .comment {
      margin: 0 auto 22px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f1eefb;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.45;
      text-align: center;
      white-space: pre-line;
    }
    .bill {
      border-top: 1px dashed #c9c1e6;
      padding-top: 18px;
      text-align: center;
    }
    .amount-label {
      font-size: 13px;
      color: #6b5aa8;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .amount {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .bill-text {
      font-size: 14px;
      line-height: 1.55;
      color: #4d4664;
      white-space: pre-line;
    }
    .actions {
      display: none;
      margin-top: 16px;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .actions.show { display: flex; }
    .secondary {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: none;
      font-size: 15px;
      padding: 12px 18px;
    }
    .primary {
      font-size: 15px;
      padding: 12px 18px;
    }
    .note {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>🛸 가사 UFO Catcher</h1>
    <div class="subtitle">타이틀곡 카드 20장 MVP</div>

    <section id="machine" class="machine">
      <div class="ufo">🛸</div>
      <div class="claw"></div>
      <div class="capsules">💿 ✨ 📀 🌙 💿 ✨ 📀</div>
    </section>

    <button id="drawBtn">카드 뽑기</button>

    <section id="card" class="card">
      <div id="song" class="song"></div>
      <p id="lyric" class="lyric"></p>
      <div id="comment" class="comment"></div>
      <div class="bill">
        <div class="amount-label">💿 후정산 금액</div>
        <div id="amount" class="amount"></div>
        <div class="bill-text">이 카드뽑기는 후정산입니다.
이제 입금해주세요. (optional)</div>
      </div>
    </section>

    <div id="actions" class="actions">
      <button class="secondary" id="againBtn">다시 뽑기</button>
      <button class="primary" onclick="alert('여기에 공구 참여 링크를 연결하면 됩니다!')">공구 참여하기</button>
    </div>

    <div class="note">※ 테스트용 MVP입니다. 문구와 금액은 얼마든지 바꿀 수 있어요.</div>
  </main>

  <script>
    const cards = [
      {
        song: "무얼 훔치지",
        lyric: "후회를 하나 둘 꺼내서\n읽으려다 그냥 말았어\n거의 외웠으니까",
        comment: "그냥 읽으세요.\n그러니 지식인이 못 되시는 겁니다.",
        amount: "10,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "꿈들을 몇 벌 꺼내서\n입으려다 그냥 말았어\n어울리지 않잖아",
        comment: "다이어트를 합시다.",
        amount: "5,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "텅 빈 하루를 채우다\n잠은 가루가 됐나봐",
        comment: "수면부족으로 판단됩니다.",
        amount: "10,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "태양은 언제나 멀지",
        comment: "태양 탓을 하기 전에\n일단 소파에서 일어나 보겠습니다.",
        amount: "20,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "조바심에 저 바람에\n주파수를 훔쳐봐도",
        comment: "와이파이는 아닙니다.",
        amount: "5,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "노을을 훔치는\n저기 언덕을 가도",
        comment: "무단반출은 금지입니다.",
        amount: "10,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "왜 내가 바라보아도\n녹슬지 않는지",
        comment: "방청소를 하신 건가요?",
        amount: "20,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "날짜들보다 오래 된\n발자국처럼 노래가",
        comment: "업데이트가 필요한 추억입니다.",
        amount: "10,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "포기하려 했는데",
        comment: "안됩니다.\n다시 생각하세요.",
        amount: "30,000원"
      },
      {
        song: "무얼 훔치지",
        lyric: "난 눈물을 훔치지",
        comment: "절도는 범죄입니다.",
        amount: "20,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "어머 난 난시가 있어 아마",
        comment: "안경점 방문을 권장합니다.",
        amount: "5,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "토성의 고리\n손가락엔 안 맞아",
        comment: "사이즈를 확인하세요.",
        amount: "10,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "천체를 접붙인 왕관을 가져와도\n어머 난 얼굴도 작아 아마",
        comment: "자랑은 적당히 합시다.",
        amount: "20,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "눈 감아 휘청이는 건\n좀 봐주세요",
        comment: "퇴근 직전으로 판정되었습니다.",
        amount: "10,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "시대의 품 속에\n얼어붙은 우린",
        comment: "에어컨 온도를 올리세요.",
        amount: "5,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "얼어 죽을 개인\n얼어 죽을 내일",
        comment: "일기예보를 확인하세요.",
        amount: "10,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "아마 빛을 잃은 거울",
        comment: "닦아보셨습니까?",
        amount: "5,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "아마 위층에는 해야",
        comment: "층간소음 관련 문의는 관리사무소로.",
        amount: "20,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "아마 미쳐가는 서울에",
        comment: "서울시의 입장은 다를 수 있습니다.",
        amount: "30,000원"
      },
      {
        song: "뒤척이는 허울",
        lyric: "아마 뒤척이는 허울",
        comment: "일단 누워서 생각합시다.",
        amount: "10,000원"
      }
    ];

    const machine = document.getElementById("machine");
    const drawBtn = document.getElementById("drawBtn");
    const againBtn = document.getElementById("againBtn");
    const cardEl = document.getElementById("card");
    const actions = document.getElementById("actions");
    const songEl = document.getElementById("song");
    const lyricEl = document.getElementById("lyric");
    const commentEl = document.getElementById("comment");
    const amountEl = document.getElementById("amount");

    function pickCard() {
      cardEl.classList.remove("show");
      actions.classList.remove("show");
      drawBtn.disabled = true;
      drawBtn.textContent = "집게 작동 중...";
      machine.classList.add("drawing");

      setTimeout(() => {
        const card = cards[Math.floor(Math.random() * cards.length)];
        songEl.textContent = "🎵 " + card.song;
        lyricEl.textContent = "“" + card.lyric + "”";
        commentEl.textContent = card.comment;
        amountEl.textContent = card.amount;

        machine.classList.remove("drawing");
        drawBtn.disabled = false;
        drawBtn.textContent = "카드 뽑기";
        cardEl.classList.add("show");
        actions.classList.add("show");
      }, 1800);
    }

    drawBtn.addEventListener("click", pickCard);
    againBtn.addEventListener("click", pickCard);
  </script>
</body>
</html>
